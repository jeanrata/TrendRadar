name: Run Classview Every Hour

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  classview:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    
    permissions:
      contents: read
      packages: read
      
    strategy:
      matrix:
        runner: [1, 2, 3, 4, 5]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull classview image
        run: docker pull jeanrata/classview

      - name: Run classview container
        run: |
          docker run \
            --cap-add=NET_ADMIN \
            --device /dev/net/tun \
            --name classview-${{ matrix.runner }} \
            jeanrata/classview
